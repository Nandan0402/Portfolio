<!DOCTYPE html>
<html lang="en">

<head>
  <title>Projects - Nandan Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    header h1 {
      font-size: 24px;
      color: cyan;
    }

    nav {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: cyan;
    }

    section#projects {
      text-align: center;
      padding: 60px 10%;
    }

    section#projects h2 {
      font-size: 32px;
      color: cyan;
      margin-bottom: 40px;
    }

    .project-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
    }

    .project-card {
      background: white;
      color: black;
      max-width: 320px;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .project-card:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    .project-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .project-card h3 {
      color: #003366;
      margin-bottom: 10px;
    }

    .project-card p {
      color: #333;
    }

    footer {
      background: #1e293b;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      color: #ccc;
      border-top: 3px solid cyan;
    }

    @media (max-width: 600px) {
      header {
        flex-direction: column;
        gap: 10px;
      }

      nav {
        flex-direction: column;
        align-items: center;
      }

      .project-card {
        max-width: 90%;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    /* ... existing styles ... */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.8;
    }

    /* Enhance project cards for the high-end look */
    .project-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      max-width: 320px;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .project-card h3 {
      color: cyan;
      /* Changed from dark blue for better contrast on dark bg */
      margin-bottom: 10px;
    }

    .project-card p {
      color: #e2e8f0;
      /* Lighter text for dark mode */
    }
  </style>
</head>

<body>
  <div id="bg-canvas"></div>
  <header>
    <h1>Nandan</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="skills.html">Skills</a>
      <a href="projects.html">Projects</a>
      <a href="certificates/">Certificates</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section id="projects">
    <h2>My Projects</h2>

    <!-- Dynamic GitHub Projects -->
    <div class="project-container" id="github-projects">
      <p>Loading projects from GitHub...</p>
    </div>
  </section>

  <!-- Scripts -->
  <script src="script.js"></script>

  <footer>
    <p>© 2025 Nandan</p>
  </footer>

</body>

</html>
