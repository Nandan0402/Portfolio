  <style>
    

    

    

    

    

    

    

    

    

    

    

    

    section#projects {
      padding: 80px 6%;
      text-align: center;
    }

    section#projects h2 {
      font-family: 'Cinzel', serif;
      font-size: 42px;
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--fire-gold), var(--fire-orange));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section-subtitle {
      color: var(--text-muted);
      font-size: 16px;
      margin-bottom: 50px;
    }

    .project-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 28px;
    }

    .project-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      overflow: hidden;
      width: 300px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
      transition: box-shadow 0.35s, border-color 0.35s;
    }

    .project-card:hover {
      box-shadow: 0 0 40px rgba(255, 100, 0, 0.4), 0 15px 40px rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 157, 0, 0.6);
    }

    .project-card img {
      width: 100%;
      height: 145px;
      object-fit: cover;
      border-bottom: 1px solid rgba(255, 100, 0, 0.2);
    }

    .p-content {
      padding: 18px;
      text-align: left;
    }

    .p-content h3 {
      color: var(--fire-gold);
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .p-content p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .tags {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .tags span {
      background: rgba(255, 100, 0, 0.12);
      border: 1px solid rgba(255, 120, 0, 0.25);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      color: var(--fire-amber);
    }

    .p-content a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--dark-bg);
      background: linear-gradient(135deg, var(--fire-orange), var(--fire-amber));
      padding: 8px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      transition: box-shadow 0.3s, transform 0.2s;
    }

    .p-content a:hover {
      box-shadow: 0 0 20px rgba(255, 100, 0, 0.6);
    }

    

    @media (max-width: 768px) {
      

      

      section#projects h2 {
        font-size: 28px;
      }

      .project-card {
        width: 90%;
        max-width: 340px;
      }
    }
  </style>
</head>
