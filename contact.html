<!DOCTYPE html>
<html lang="en">

<head>
  <title>Contact - Nandan Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
      overflow-x: hidden;
    }

    /* 3D Background */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.8;
    }

    header {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      position: relative;
      z-index: 10;
    }

    header h1 {
      font-size: 24px;
      color: cyan;
      margin: 0;
    }

    nav {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: cyan;
    }

    #contact {
      text-align: center;
      padding: 60px 10%;
    }

    #contact h2 {
      font-size: 32px;
      color: cyan;
      margin-bottom: 40px;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    .contact-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
    }

    .contact-card {
      background: rgba(255, 255, 255, 0.05);
      /* Glass effect */
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 30px;
      width: 250px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .contact-card:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 30px rgba(0, 255, 255, 0.2);
    }

    .contact-card i {
      font-size: 40px;
      color: cyan;
      margin-bottom: 15px;
    }

    .contact-card p a {
      color: white;
      font-weight: bold;
      text-decoration: none;
      font-size: 1.1em;
      transition: 0.3s;
    }

    .contact-card p a:hover {
      color: cyan;
      text-decoration: none;
    }

    footer {
      background: rgba(30, 41, 59, 0.8);
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      color: #ccc;
      border-top: 1px solid rgba(0, 255, 255, 0.3);
    }

    @media (max-width: 600px) {
      header {
        flex-direction: column;
        gap: 10px;
      }

      nav {
        flex-direction: column;
        align-items: center;
      }

      .contact-card {
        width: 100%;
        max-width: 300px;
      }
    }
  </style>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="script.js" defer></script>
</head>

<body>

  <div id="bg-canvas"></div>

  <header>
    <h1>Nandan</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="skills.html">Skills</a>
      <a href="projects.html">Projects</a>
      <a href="certificates/">Certificates</a>
      <a href="content.html">Contact</a>
    </nav>
  </header>

  <section id="contact">
    <h2>Contact Me</h2>
    <div class="contact-grid">

      <div class="contact-card">
        <i class="fab fa-instagram"></i>
        <p><a href="https://www.instagram.com/docu__store/?hl=en" target="_blank">@docu__store</a></p>
      </div>

      <div class="contact-card">
        <i class="fab fa-linkedin"></i>
        <p><a href="https://www.linkedin.com/in/nandan-b-2a9b1b334" target="_blank">Nandan B</a></p>
      </div>

      <div class="contact-card">
        <i class="fas fa-envelope"></i>
        <p><a href="mailto:fusioncode87@gmail.com">Docu Store</a></p>
      </div>

      <div class="contact-card">
        <i class="fas fa-globe"></i>
        <p><a href="https://docustore-frontend.onrender.com" target="_blank">Docustore Website</a></p>
      </div>

    </div>
  </section>

  <footer>
    <p>© 2025 Nandan. All rights reserved.</p>
  </footer>

</body>

</html>
