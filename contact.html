<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Nandan Fire Legend Portfolio</title>
  <meta name="description" content="Contact Nandan B — reach out through GitHub, LinkedIn, Instagram, or email." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    :root {
      --fire-red: #ff3a00;
      --fire-orange: #ff6b2b;
      --fire-amber: #ff9d00;
      --fire-gold: #ffd000;
      --dark-bg: #060200;
      --card-bg: rgba(255, 80, 0, 0.06);
      --card-border: rgba(255, 120, 0, 0.25);
      --text-main: #fff5e6;
      --text-muted: #c4a88a;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--dark-bg);
      color: var(--text-main);
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 60px;
      background: rgba(6, 2, 0, 0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 100, 0, 0.2);
      box-shadow: 0 0 40px rgba(255, 80, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--fire-gold), var(--fire-orange), var(--fire-red));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav {
      display: flex;
      gap: 28px;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: color 0.3s;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--fire-orange), var(--fire-gold));
      transition: width 0.3s;
      border-radius: 2px;
    }

    nav a:hover {
      color: var(--fire-gold);
    }

    nav a:hover::after {
      width: 100%;
    }

    #contact {
      padding: 80px 8%;
      text-align: center;
    }

    #contact h2 {
      font-family: 'Cinzel', serif;
      font-size: 42px;
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--fire-gold), var(--fire-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section-subtitle {
      color: var(--text-muted);
      font-size: 16px;
      margin-bottom: 50px;
    }

    .contact-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 28px;
    }

    .contact-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 38px 28px;
      width: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
      text-align: center;
      transition: transform 0.35s, box-shadow 0.35s, border-color 0.35s;
      text-decoration: none;
      color: inherit;
    }

    .contact-card:hover {
      transform: translateY(-8px) scale(1.04);
      box-shadow: 0 0 40px rgba(255, 100, 0, 0.35), 0 15px 35px rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 157, 0, 0.5);
    }

    .contact-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, rgba(255, 80, 0, 0.2), rgba(255, 157, 0, 0.1));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border: 1px solid rgba(255, 120, 0, 0.3);
      color: var(--fire-orange);
      transition: box-shadow 0.3s;
    }

    .contact-card:hover .contact-icon {
      box-shadow: 0 0 24px rgba(255, 100, 0, 0.6);
      color: var(--fire-gold);
    }

    .contact-card h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
    }

    .contact-card p {
      margin: 0;
      font-size: 13px;
      color: var(--text-muted);
    }

    footer {
      background: rgba(6, 2, 0, 0.8);
      text-align: center;
      padding: 22px;
      margin-top: 60px;
      color: var(--text-muted);
      border-top: 1px solid rgba(255, 100, 0, 0.15);
      font-size: 14px;
    }

    @media (max-width: 768px) {
      header {
        padding: 14px 20px;
        flex-wrap: wrap;
        gap: 10px;
      }

      nav {
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
      }

      #contact h2 {
        font-size: 30px;
      }

      .contact-card {
        width: 90%;
        max-width: 300px;
      }
    }
  </style>
</head>

<body>
  <canvas id="bg-canvas"></canvas>

  <header>
    <span class="logo">🔥 Nandan</span>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="skills.html">Skills</a>
      <a href="projects.html">Projects</a>
      <a href="certificates/">Certificates</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section id="contact">

    <div class="contact-grid">

        <div class="contact-icon"><i class="fab fa-instagram"></i></div>
        <h3>Instagram</h3>
        <p>@docu__store</p>
      </a>

      <a class="contact-card" href="https://www.linkedin.com/in/nandan-b-2a9b1b334" target="_blank">
        <div class="contact-icon"><i class="fab fa-linkedin"></i></div>
        <h3>LinkedIn</h3>

      </a>

      <a class="contact-card" href="mailto:fusioncode87@gmail.com">
        <div class="contact-icon"><i class="fas fa-envelope"></i></div>
        <h3>Email</h3>

      </a>

      <a class="contact-card" href="https://docustore-frontend.onrender.com" target="_blank">
        <div class="contact-icon"><i class="fas fa-globe"></i></div>

      <a class="contact-card" href="https://github.com/Nandan0402" target="_blank">
        <div class="contact-icon"><i class="fab fa-github"></i></div>
        <h3>GitHub</h3>
        <p>Nandan0402</p>
      </a>

    </div>
  </section>

  <footer>
    <p>© 2025 Nandan · Forged with 🔥</p>
  </footer>

  <script src="script.js" defer></script>
</body>

</html>
