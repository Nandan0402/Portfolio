<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nandan — Client Feedback</title>
  <meta name="description"
    content="Nandan B — Full Stack Developer and Startup Founder. Proven MERN expertise with 50+ projects, a deployed product (Docustore), and multiple ongoing startups." />
  <link rel="icon" href="profile.jpg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    :root {
      --fire-red: #ff3a00;
      --fire-orange: #ff6b2b;
      --fire-amber: #ff9d00;
      --fire-gold: #ffd000;
      --dark-bg: #060200;
      --card-bg: rgba(255, 80, 0, 0.06);
      --card-border: rgba(255, 120, 0, 0.25);
      --text-main: #fff5e6;
      --text-muted: #c4a88a;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--dark-bg);
      color: var(--text-main);
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 60px;
      background: rgba(6, 2, 0, 0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 100, 0, 0.2);
      box-shadow: 0 0 40px rgba(255, 80, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--fire-gold), var(--fire-orange), var(--fire-red));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav {
      display: flex;
      gap: 28px;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: color 0.3s;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--fire-orange), var(--fire-gold));
      transition: width 0.3s;
      border-radius: 2px;
    }

    nav a:hover {
      color: var(--fire-gold);
    }

    nav a:hover::after {
      width: 100%;
    }

    /* ── Hero Section ── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px 8% 60px;
      gap: 50px;
    }

    .hero-text {
      flex: 1;
      max-width: 580px;
    }

    .hero-text h1 {
      font-family: 'Cinzel', serif;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 3px;
      margin: 0 0 6px;
      background: linear-gradient(135deg, var(--fire-gold), var(--fire-orange), var(--fire-red), var(--fire-gold));
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fireTextGlow 5s ease infinite alternate;
    }

    @keyframes fireTextGlow {
      0% { background-position: 0% 50%; text-shadow: 0 0 5px rgba(255,100,0,0.1); }
      50% { background-position: 100% 50%; text-shadow: 0 0 25px rgba(255,150,0,0.6); }
      100% { background-position: 0% 50%; text-shadow: 0 0 5px rgba(255,100,0,0.1); }
    }

    .hero-text .subtitle {
      font-size: 22px;
      font-weight: 700;
      color: var(--fire-orange);
      margin-bottom: 20px;
    }

    .hero-text .description {
      font-size: 16px;
      line-height: 1.8;
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    /* ── CTA Buttons ── */
    .cta-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 30px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--fire-red), var(--fire-orange), var(--fire-amber));
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(255, 80, 0, 0.45);
      transition: transform 0.25s, box-shadow 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 40px rgba(255, 100, 0, 0.7);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 30px;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.3s, border-color 0.3s;
    }

    .btn-secondary:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 24px rgba(255, 100, 0, 0.3);
      border-color: rgba(255, 157, 0, 0.5);
    }

    /* ── Social Chips ── */
    .social-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .social-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 30px;
      background: rgba(255, 100, 0, 0.1);
      border: 1px solid rgba(255, 120, 0, 0.3);
      color: var(--fire-amber);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .social-chip:hover {
      background: rgba(255, 100, 0, 0.22);
      box-shadow: 0 0 16px rgba(255, 100, 0, 0.3);
    }

    .social-chip i {
      font-size: 14px;
    }

    /* ── Float Animation ── */
    @keyframes floatHero {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    /* ── Hero Image ── */
    .hero-image {
      flex-shrink: 0;
      position: relative;
      animation: floatHero 4s ease-in-out infinite;
    }

    .hero-image .img-ring {
      position: relative;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: conic-gradient(var(--fire-red), var(--fire-orange), var(--fire-amber), var(--fire-gold), var(--fire-orange), var(--fire-red));
      padding: 6px;
    }

    .hero-image .img-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--dark-bg);
    }

    @keyframes spinRing {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Glow behind the ring */
    .hero-image::before {
      content: '';
      position: absolute;
      top: -15px;
      left: -15px;
      right: -15px;
      bottom: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 100, 0, 0.25) 0%, transparent 70%);
      z-index: -1;
      animation: pulseGlow 3s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      0% {
        opacity: 0.6;
        transform: scale(1);
      }

      100% {
        opacity: 1;
        transform: scale(1.08);
      }
    }

    /* ── Stats Section ── */
    .stats-section {
      padding: 40px 8% 70px;
      display: flex;
      justify-content: center;
    }

    .stats-grid {
      display: flex;
      gap: 0;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(255, 80, 0, 0.08), 0 8px 30px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    .stat-item {
      padding: 32px 40px;
      text-align: center;
      position: relative;
      transition: background 0.3s;
    }

    .stat-item:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: var(--card-border);
    }

    .stat-item:hover {
      background: rgba(255, 100, 0, 0.08);
    }

    .stat-number {
      font-family: 'Cinzel', serif;
      font-size: 36px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--fire-gold), var(--fire-orange));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 600;
    }

    /* ── Footer ── */
    footer {
      background: rgba(6, 2, 0, 0.8);
      text-align: center;
      padding: 22px;
      margin-top: 0;
      color: var(--text-muted);
      border-top: 1px solid rgba(255, 100, 0, 0.15);
      font-size: 14px;
    }

    /* ── Freelancing Services ── */
    .freelance-section {
      padding: 60px 8% 80px;
    }
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 40px;
      text-align: center;
      margin-bottom: 50px;
      background: linear-gradient(135deg, var(--fire-gold), var(--fire-orange));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .freelance-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }
    .service-card {
      background: rgba(255, 80, 0, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(10px);
      transition: transform 0.4s, box-shadow 0.4s, border-color 0.4s;
      position: relative;
      overflow: hidden;
    }
    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(255, 80, 0, 0.15);
      border-color: rgba(255, 120, 0, 0.5);
    }
    .service-card h3 {
      font-size: 22px;
      color: var(--fire-gold);
      margin-top: 0;
      margin-bottom: 12px;
    }
    .service-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .service-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 24px;
    }
    .btn-contact-service {
      display: inline-block;
      padding: 10px 24px;
      background: rgba(255, 80, 0, 0.1);
      border: 1px solid var(--fire-orange);
      border-radius: 8px;
      color: var(--fire-orange);
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-contact-service:hover {
      background: var(--fire-orange);
      color: #fff;
      box-shadow: 0 0 15px rgba(255, 100, 0, 0.4);
    }

    /* ── CTA Section ── */
    .cta-section {
      text-align: center;
      padding: 70px 8%;
      background: linear-gradient(to right, rgba(255, 80, 0, 0.02), rgba(255, 120, 0, 0.08), rgba(255, 80, 0, 0.02));
      border-top: 1px solid rgba(255, 100, 0, 0.1);
      border-bottom: 1px solid rgba(255, 100, 0, 0.1);
      margin: 40px 0;
    }
    .cta-section h2 {
      font-family: 'Cinzel', serif;
      font-size: 36px;
      color: var(--text-main);
      margin-bottom: 30px;
    }

    /* ── Testimonials ── */
    .testimonials-section {
      padding: 60px 8% 40px;
    }
    .testimonials-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
    }
    .testimonial-card {
      width: 100%;
      max-width: 380px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      transition: transform 0.3s;
      display: flex;
      flex-direction: column;
    }
    .testimonial-card:hover {
      transform: translateY(-5px);
    }
    .t-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .t-info h4 {
      margin: 0;
      font-size: 18px;
      color: var(--fire-gold);
    }
    .t-info span {
      font-size: 13px;
      color: var(--text-muted);
    }
    .t-rating {
      color: var(--fire-amber);
      font-size: 14px;
    }
    .t-message {
      font-size: 15px;
      font-style: italic;
      color: #e0d5c1;
      line-height: 1.6;
      margin-top: 15px;
      margin-bottom: 25px;
      flex-grow: 1;
    }
    .t-date {
      font-size: 12px;
      color: rgba(196, 168, 138, 0.6);
      text-align: right;
      margin-top: auto;
    }

    /* ── Feedback Form ── */
    .feedback-section {
      padding: 40px 8% 80px;
      display: flex;
      justify-content: center;
    }
    .feedback-container {
      background: rgba(6, 2, 0, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 0 30px rgba(255, 80, 0, 0.05);
      backdrop-filter: blur(10px);
    }
    .feedback-container h3 {
      text-align: center;
      color: var(--fire-orange);
      font-size: 26px;
      margin-top: 0;
      margin-bottom: 25px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 100, 0, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      transition: border-color 0.3s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none;
      border-color: var(--fire-orange);
      background: rgba(255, 255, 255, 0.08);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }
    .form-group select option {
      background: var(--dark-bg);
      color: var(--text-main);
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--fire-red), var(--fire-orange));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 100, 0, 0.4);
    }
    .feedback-msg {
      display: none;
      text-align: center;
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
    }
    .feedback-msg.success {
      display: block;
      background: rgba(46, 213, 115, 0.1);
      color: #2ed573;
      border: 1px solid rgba(46, 213, 115, 0.3);
    }
    
    .see-feedback-btn-wrapper {
      text-align: center;
      margin-top: 40px;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .hero {
        flex-direction: column-reverse;
        text-align: center;
        padding: 50px 6%;
      }

      .hero-text {
        max-width: 100%;
        align-items: center;
        display: flex;
        flex-direction: column;
      }

      .hero-text h1 {
        font-size: 36px;
      }

      .cta-buttons {
        justify-content: center;
      }

      .social-chips {
        justify-content: center;
      }

      .hero-image .img-ring {
        width: 240px;
        height: 240px;
      }

      .stats-grid {
        flex-wrap: wrap;
      }

      .stat-item {
        padding: 24px 28px;
        flex: 1 1 auto;
        min-width: 120px;
      }

      .stat-item:not(:last-child)::after {
        display: none;
      }
    }

    @media (max-width: 768px) {
      header {
        padding: 14px 20px;
        flex-wrap: wrap;
        gap: 10px;
      }

      nav {
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
      }
    }

    @media (max-width: 480px) {
      .cta-buttons {
        gap: 12px;
      }

      .btn-primary, .btn-secondary {
        padding: 12px 14px;
        font-size: 14px;
        flex: 1 1 calc(50% - 12px);
      }

      .hero-text h1 {
        font-size: 28px;
      }

      .hero-text .subtitle {
        font-size: 17px;
      }

      .hero-image .img-ring {
        width: 200px;
        height: 200px;
      }

      .stat-number {
        font-size: 26px;
      }

      .stat-item {
        padding: 18px 16px;
      }
    }
  </style>
</head>

  <!-- ═══ PUBLIC FEEDBACK FORM ═══ -->
  <section class="feedback-section" id="leave-feedback">
    <div class="feedback-container">
      <h3>Submit Your Feedback</h3>
      <form id="feedback-form">
        <div class="form-group">
          <label for="fb-name">Name</label>
          <input type="text" id="fb-name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="fb-business">Business Type</label>
          <input type="text" id="fb-business" required placeholder="e.g. Real Estate, E-commerce">
        </div>
        <div class="form-group">
          <label for="fb-rating">Rating</label>
          <select id="fb-rating" required>
            <option value="5">5 Stars - Excellent</option>
            <option value="4">4 Stars - Very Good</option>
            <option value="3">3 Stars - Good</option>
            <option value="2">2 Stars - Fair</option>
            <option value="1">1 Star - Poor</option>
          </select>
        </div>
        <div class="form-group">
          <label for="fb-message">Feedback Message</label>
          <textarea id="fb-message" required placeholder="Tell us about your experience..."></textarea>
        </div>
        <button type="submit" class="btn-submit">Submit Feedback</button>
        <div id="fb-status" class="feedback-msg"></div>
      </form>
      <div class="see-feedback-btn-wrapper">
         <a href="#testimonials" class="btn-secondary">See My Feedback</a>
      </div>
    </div>
  </section>

  <!-- ═══ TESTIMONIALS ═══ -->
  <section class="testimonials-section" id="testimonials">
    <h2 class="section-title">Client Feedback</h2>
    <div class="testimonials-grid" id="testimonials-container">
    </div>
  </section>
